<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="description"
      content="Get counsel on love, relationship and marriage. LoveGuide helps you seek insight about what love really is"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>LoveGuide</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./images/favicon-32x32.png" type="image/png" />
  </head>
  <body>
    <div class="toast-container" id="toast-container"></div>
    <div class="overall-container">
      <!-- HEADER -->
      <header class="header-container">
        <nav class="header__nav-container">
          <h2 class="header__nav__logo-name">LoveGuide</h2>
        </nav>
      </header>

      <!-- MAIN -->
      <main>
        <section>
          <h1 class="main__heading">Your Guide to finding a good partner</h1>
        </section>

        <div class="main__quotes-container">
          <!-- first-btns -->
          <div class="main__first-btns-container">
            <!-- add favorite quote -->
            <button aria-label="btn-fav" class="btn-fav" id="btn-fav">
              Add to Fav
              <svg
                class="svg-fav"
                id="svg-fav"
                xmlns="http://www.w3.org/2000/svg"
                width="800"
                height="800"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  fill="currentColor"
                  d="m8.962 18.91.464-.588zM12 5.5l-.54.52a.75.75 0 0 0 1.08 0zm3.038 13.41.465.59zm-5.612-.588C7.91 17.127 6.253 15.96 4.938 14.48 3.65 13.028 2.75 11.335 2.75 9.137h-1.5c0 2.666 1.11 4.7 2.567 6.339 1.43 1.61 3.254 2.9 4.68 4.024zM2.75 9.137c0-2.15 1.215-3.954 2.874-4.713 1.612-.737 3.778-.541 5.836 1.597l1.08-1.04C10.1 2.444 7.264 2.025 5 3.06 2.786 4.073 1.25 6.425 1.25 9.137zM8.497 19.5c.513.404 1.063.834 1.62 1.16s1.193.59 1.883.59v-1.5c-.31 0-.674-.12-1.126-.385-.453-.264-.922-.628-1.448-1.043zm7.006 0c1.426-1.125 3.25-2.413 4.68-4.024 1.457-1.64 2.567-3.673 2.567-6.339h-1.5c0 2.198-.9 3.891-2.188 5.343-1.315 1.48-2.972 2.647-4.488 3.842zM22.75 9.137c0-2.712-1.535-5.064-3.75-6.077-2.264-1.035-5.098-.616-7.54 1.92l1.08 1.04c2.058-2.137 4.224-2.333 5.836-1.596 1.659.759 2.874 2.562 2.874 4.713zm-8.176 9.185c-.526.415-.995.779-1.448 1.043s-.816.385-1.126.385v1.5c.69 0 1.326-.265 1.883-.59.558-.326 1.107-.756 1.62-1.16z"
                />
              </svg>
            </button>
            <!-- generate quote -->
            <button
              class="btn-generate-quote"
              id="btn-quote"
              aria-label="generate-quote"
            >
              Generate quote
            </button>
          </div>
          <!-- second btns -->
          <!-- show all quotes -->
          <div class="main__second-btns-container">
            <button
              aria-label="show-all-quotes"
              class="btn-show-all"
              id="btn-show-all"
            >
              All Quotes
            </button>
            <!-- hide all quotes -->
            <button
              aria-label="hide-all-quotes"
              class="hide-all-quotes"
              id="hide-all-quotes"
            >
              Hide All Quotes
            </button>
          </div>

          <!-- group category -->
          <div class="main__group-category-container">
            <label for="category-select" class="category-label"
              >Choose a Category:</label
            >
            <select name="category" id="category-select" class="category">
              <option value="" disabled selected>Select an option</option>
              <option value="marriage" id="marriage">Marriage</option>
              <option value="dating" id="dating">Dating</option>
            </select>
          </div>

          <!-- quotes-display -->
          <div
            class="main__quote-display-container"
            id="main__quotes-display-container"
          >
            <p id="quote"></p>
            <p id="author"></p>
          </div>
          <!-- show all quotes display -->
          <div>
            <div id="all-quotes-container"></div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./main.js" defer></script>
  </body>
</html>
