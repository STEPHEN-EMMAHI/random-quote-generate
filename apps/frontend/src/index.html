<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="description"
      content="Get counsel on love, relationship and marriage. LoveGuide helps you seek insight about what love really is"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>LoveGuide</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link
      rel="icon"
      href="./assets/images/favicon-32x32.png"
      type="image/png"
    />
  </head>
  <body>
    <div class="div-container">
      <!-- HEADER -->
      <header class="header">
        <nav class="nav">
          <h2 class="nav__logo-name">LoveGuide</h2>
        </nav>
      </header>

      <!-- MAIN -->
      <main>
        <section>
          <h1 class="main__heading">Your Guide to finding a good partner</h1>
        </section>

        <div class="main__div-quotes">
          <div class="main__div-btn">
            <button aria-label="btn-fav" class="btn-fav">
              Fav
              <i class="fas fa-heart"></i>
            </button>
            <button
              class="main__btn-generate-quote"
              id="btn-quote"
              aria-label="generate-quote"
            >
              Generate quote
            </button>
          </div>

          <div class="main__div-quote-display">
            <p id="quote" class="quote"></p>
            <p id="author"></p>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./scripts/main.js" defer></script>
  </body>
</html>
