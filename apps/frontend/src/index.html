<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="description"
      content="Get counsel on love, relationship and marriage. LoveGuide helps you seek insight about what love really is"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>LoveGuide</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link
      rel="stylesheet"
      href="/node_modules/@fortawesome/fontawesome-free/css/all.min.css"
    />
    <link
      rel="icon"
      href="./assets/images/favicon-32x32.png"
      type="image/png"
    />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <nav class="nav">
        <h2 class="nav__logo-name">LoveGuide</h2>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="main">
      <section class="main__section-head">
        <h1 class="main__heading">Your Guide to finding a good partner</h1>
      </section>

      <section class="main__section-quotes">
        <button class="main__btn-generate-quote" id="btn-quote">
          Generate quote
        </button>
        <div class="main__div-quote-display">
          <p id="quote" class="quote"></p>
          <p id="author"></p>
        </div>
      </section>
    </main>
    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
